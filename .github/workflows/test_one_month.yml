name: تست دانلود یک ماه و commit به مخزن

on:
  workflow_dispatch:

jobs:
  download_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد مخزن
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: نصب کتابخانه‌ها
        run: pip install requests pandas

      - name: اجرای اسکریپت دانلود
        run: python test_one_month.py

      - name: commit و push فایل CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add BTCUSDT_5m_test.csv
          git commit -m "Add BTC 5-min test data" || echo "No changes to commit"
          git push

      - name: آپلود خروجی (پشتیبان)
        uses: actions/upload-artifact@v4
        with:
          name: btc-5min-test
          path: BTCUSDT_5m_test.csv
